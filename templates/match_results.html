{% extends "base.html" %}

{% block title %}Match-Ergebnisse | Hire Hero{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Match-Ergebnisse</h1>
  <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Übersicht passender Stellenanzeigen mit Ranking und Kurzbegründung.</p>
</div>

<section class="section">
  <div class="card">
    <h2>Top Match</h2>
    <p>Match-Score, passende Skills, mögliche Skill-Gaps.</p>
    <div class="actions">
      <a href="/jobs/detail" class="btn btn-primary">Details öffnen</a>
      <button type="button" class="btn btn-secondary">Speichern</button>
    </div>
  </div>
</section>
{% endblock %}
