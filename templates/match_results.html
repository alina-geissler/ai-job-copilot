{% extends "base.html" %}

{% block title %}Match-Ergebnisse | AI Job Copilot{% endblock %}

{% block content %}
<header class="page-header">
  <h1>Match-Ergebnisse</h1>
  <p class="muted">Übersicht passender Stellenanzeigen mit Ranking und Kurzbegründung.</p>
</header>

<section class="section">
  <div class="card">
    <h2>Top Match</h2>
    <p>Match-Score, passende Skills, mögliche Skill-Gaps.</p>
    <div class="actions">
      <a href="/jobs/detail" class="btn btn-primary">Details öffnen</a>
      <button type="button" class="btn btn-secondary">Speichern</button>
    </div>
  </div>
</section>
{% endblock %}
