{% extends "base.html" %}

{% block title %}Login / Registrierung | AI Job Copilot{% endblock %}

{% block content %}
<header class="page-header">
  <h1>Login / Registrierung</h1>
  <p class="muted">Hier können sich Nutzerinnen später einloggen oder registrieren.</p>
</header>

<section class="section">
  <div class="card">
    <h2>Login</h2>
    <form method="post" action="/login" class="form">
      <div class="form-group">
        <label for="login-email">E-Mail</label>
        <input type="email" id="login-email" name="login-email" placeholder="E-Mail" required>
      </div>
      <div class="form-group">
        <label for="login-password">Passwort</label>
        <input type="password" id="login-password" name="login-password" placeholder="Passwort" required>
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">Login</button>
      </div>
    </form>
  </div>
</section>

<section class="section">
  <div class="card">
    <h2>Registrierung</h2>
    <form method="post" action="/register" class="form">
      <div class="form-group">
        <label for="register-name">Name</label>
        <input type="text" id="register-name" name="register-name" placeholder="Name" required>
      </div>
      <div class="form-group">
        <label for="register-email">E-Mail</label>
        <input type="email" id="register-email" name="register-email" placeholder="E-Mail" required>
      </div>
      <div class="form-group">
        <label for="register-password">Passwort</label>
        <input type="password" id="register-password" name="register-password" placeholder="Passwort" required>
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">Konto erstellen</button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
